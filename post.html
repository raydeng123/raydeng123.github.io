<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Read article details, thoughts, and technical reviews on Ray Deng's personal blog.">
  <meta name="author" content="Ray Deng">
  
  <title>Article Reader | Ray Deng Blog</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/styles.css?v=2.2">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/avatar.png">
  
  <!-- Markdown Parser (marked.js) from secure JSDelivr CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- --- READING PROGRESS INDICATOR --- -->
  <div class="reading-progress-container">
    <div id="reading-progress" class="reading-progress-bar"></div>
  </div>

  <!-- --- STICKY NAV BAR (VIC STYLE) --- -->
  <header class="site-nav">
    <div class="nav-inner">
      <div class="nav-brand-group">
        <a href="index.html" class="nav-brand">
          <span class="mono">Ray Deng</span>
        </a>
      </div>
      
      <nav aria-label="Main Navigation">
        <ul class="nav-tabs" id="nav-tabs">
          <li><a href="index.html#hero" class="nav-tab">Home</a></li>
          <li><a href="index.html#about" class="nav-tab">About</a></li>
        </ul>
      </nav>
      
      <div class="nav-controls">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark/light theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
        <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Open mobile menu" aria-expanded="false">
          ☰
        </button>
      </div>
    </div>
  </header>

  <!-- --- MAIN POST LAYOUT CONTAINER --- -->
  <main class="container">
    <article class="post-layout">
      
      <!-- Injected Post Header -->
      <div class="post-header">
        <a href="index.html#blog" class="post-header-back" id="post-back-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 2px;">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back to Articles
        </a>
        <br>
        <span id="post-category" class="post-category-tag">Category</span>
        <h1 id="post-title" class="post-title-main">Loading Article Title...</h1>
        
        <div class="post-meta-details">
          <span id="post-date" class="post-meta-item">📅 Date</span>
          <span id="post-read-time" class="post-meta-item">⏱️ Read Time</span>
          <button id="share-btn" class="btn btn-secondary" style="padding: 3px 10px; font-size: 0.72rem; border-radius: 4px; font-family: var(--font-mono);" aria-label="Share this article">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.25rem; vertical-align: middle;">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            Share
          </button>
        </div>
      </div>
      
      <!-- Injected Cover Graphic -->
      <img id="post-cover" src="assets/welcome-cover.webp" alt="Featured Cover Image" class="post-featured-image">
      
      <!-- dynamic content parsed from MD -->
      <div id="post-body" class="post-body">
        <p>Loading post content. Please wait...</p>
      </div>
      
    </article>
  </main>

  <!-- --- FOOTER --- -->
  <footer>
    <div class="container">
      <div class="footer-container" style="width: 100%;">
        <span class="mono" style="font-weight: 700; color: var(--text-primary);">Ray Deng</span>
        <p class="copyright">&copy; 2026 Ray Deng. All rights reserved. Serviced via GitHub Pages.</p>
      </div>
    </div>
  </footer>

  <!-- Single Post Controller -->
  <script src="js/post.js"></script>
</body>
</html>
